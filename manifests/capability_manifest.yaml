version: "1.0.8-draft"
project: ai-catia-modeling-skill
purpose: recipe_driven_catia_v5_modeling
default_mode: user
classification_values:
  - NATIVE_SUCCESS
  - GEOMETRY_EQUIVALENT
  - PARTIAL_SUCCESS
  - HONEST_FAILURE
  - UNSUPPORTED
recipe_status_allowed_user_mode:
  - stable
  - verified_repeatable
  - live_verified_once
recipe_status_developer_only:
  - draft
  - experimental
  - deprecated
native_feature_rules:
  api_call_success_is_not_enough: true
  part_update_required: true
  verifier_required: true
  geometry_equivalent_is_not_native: true
  imported_call_pattern_is_not_executable_runner: true
capability_sources:
  executable_recipe_manifest: manifests/recipe_manifest.yaml
  regression_manifest: manifests/regression_manifest.yaml
  reference_manifest: manifests/reference_manifest.yaml
capabilities:
  partdesign:
    pad:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.rectangular_pad
        - partdesign.offset_plane_pad
        - partdesign.rounded_rectangle_pad
        - partdesign.closed_spline_pad
      imported_recipe_ids:
        - partdesign.regression.t06_offset_plane_secondary_pad
        - partdesign.regression.t21_rounded_rectangle_pad
        - partdesign.regression.t23_closed_spline_pad
      reference_pattern_ids:
        - partdesign.offset_plane_support_ref
        - partdesign.tangent_arc_closed_profile
        - partdesign.closed_spline_profile
    pocket:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.native_slot_pocket
      imported_recipe_ids:
        - partdesign.regression.t05_slot_through_pocket
      user_mode: executable_runner_available
    hole:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.native_hole_from_sketch
        - partdesign.native_counterbore_holes
        - partdesign.capsule_with_native_holes
      imported_recipe_ids:
        - partdesign.regression.t02_boss_with_native_through_hole
        - partdesign.regression.t03_four_native_holes
        - partdesign.regression.t04_native_counterbore_holes
        - partdesign.regression.t20_unit_conversion_native_hole
        - partdesign.regression.t22_capsule_with_native_holes
      reference_pattern_ids:
        - partdesign.counterbore_hole_point_sketch
        - partdesign.capsule_profile_native_holes
      user_mode: executable_runner_available
    counterbore_hole:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.native_counterbore_holes
      imported_recipe_ids:
        - partdesign.regression.t04_native_counterbore_holes
      reference_pattern_ids:
        - partdesign.counterbore_hole_point_sketch
      user_mode: executable_runner_available
      caveat: countersink and threaded Hole variants remain separate promotion work
    offset_plane_pad:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.offset_plane_pad
      imported_recipe_ids:
        - partdesign.regression.t06_offset_plane_secondary_pad
      reference_pattern_ids:
        - partdesign.offset_plane_support_ref
      user_mode: executable_runner_available
      caveat: generated offset PlaneXY support only; arbitrary support-plane inference remains future work
    rounded_rectangle_pad:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.rounded_rectangle_pad
      imported_recipe_ids:
        - partdesign.regression.t21_rounded_rectangle_pad
      reference_pattern_ids:
        - partdesign.tangent_arc_closed_profile
      user_mode: executable_runner_available
      caveat: creates native Pad from rounded sketch, not a separate native fillet feature
    capsule_with_native_holes:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.capsule_with_native_holes
      imported_recipe_ids:
        - partdesign.regression.t22_capsule_with_native_holes
      reference_pattern_ids:
        - partdesign.capsule_profile_native_holes
      user_mode: executable_runner_available
      caveat: end holes are native Hole features; capsule profile constraints are not fully asserted
    closed_spline_pad:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.closed_spline_pad
      imported_recipe_ids:
        - partdesign.regression.t23_closed_spline_pad
      reference_pattern_ids:
        - partdesign.closed_spline_profile
      user_mode: executable_runner_available
      caveat: first point must repeat as final spline point; arbitrary spline repair remains future work
    rect_pattern:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.native_rectangular_pattern
      imported_recipe_ids:
        - partdesign.regression.t08_rectangular_pattern
      reference_pattern_ids:
        - partdesign.rectangular_pattern_direction_refs
      user_mode: executable_runner_available
    circ_pattern:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.native_circular_pattern
      imported_recipe_ids:
        - partdesign.regression.t09_circular_pattern
      reference_pattern_ids:
        - partdesign.circular_pattern_axis_ref
      user_mode: executable_runner_available
    mirror:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.native_mirror_plane
      imported_recipe_ids:
        - partdesign.regression.t10_mirror
      reference_pattern_ids:
        - partdesign.mirror_plane_ref
      user_mode: executable_runner_available
      caveat: native Mirror currently covers a generated seed feature mirrored across explicit PlaneYZ; arbitrary mirror plane selection remains future work
    shell:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.native_shell_selected_face
      imported_recipe_ids:
        - partdesign.regression.t14_shell_from_face_reference
      reference_pattern_ids:
        - partdesign.shell_selected_face_ref
      user_mode: executable_runner_available
      caveat: removed-face selection is constrained to a CATIA selection index; arbitrary face intent remains future verifier work
    shaft:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.native_shaft_centerline
      imported_recipe_ids:
        - partdesign.regression.t11_shaft_with_sketch_centerline
        - partdesign.regression.t13_v_pulley_by_shaft_profile
      reference_pattern_ids:
        - partdesign.sketch_revolution_axis
      user_mode: executable_runner_available
      caveat: native Shaft requires sketch.com_object.CenterLine to point at an explicit same-sketch construction axis line; pycatia API availability is not enough
    groove:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - partdesign.native_groove_centerline
      imported_recipe_ids:
        - partdesign.regression.t12_groove_with_sketch_centerline
      reference_pattern_ids:
        - partdesign.sketch_revolution_axis
      user_mode: executable_runner_available
      caveat: native Groove requires sketch.com_object.CenterLine plus an existing solid context; annular pockets are geometry equivalent
    fillet:
      status: partial_success
      classification: PARTIAL_SUCCESS
      failure_card_ids:
        - failures/regression/t01_pad_plus_single_edge_fillet_partial_success.md
      caveat: native fillet feature was created, but exact edge filtering is not promoted as a repeatable recipe
    chamfer:
      status: unsupported
      classification: UNSUPPORTED
      failure_card_ids:
        - failures/regression/t16_fillet_chamfer_order_unsupported.md
    draft:
      status: unsupported
      classification: UNSUPPORTED
      failure_card_ids:
        - failures/regression/t15_draft_shell_unsupported.md
    stiffener:
      status: unsupported
      classification: UNSUPPORTED
      failure_card_ids:
        - failures/regression/t07_rib_or_stiffener_unsupported.md
    rib:
      status: unsupported
      classification: UNSUPPORTED
      failure_card_ids:
        - failures/regression/t07_rib_or_stiffener_unsupported.md
    split:
      status: unsupported
      classification: UNSUPPORTED
      failure_card_ids:
        - failures/regression/t18_angled_cut_unsupported.md
    intersect:
      status: unsupported
      classification: UNSUPPORTED
      failure_card_ids:
        - failures/regression/t17_boolean_intersection_unsupported.md
    thread:
      status: partial_success
      classification: PARTIAL_SUCCESS
      failure_card_ids:
        - failures/regression/t27_simplified_thread_boundary_partial_success.md
      caveat: simplified bolt geometry is not a real solid helical thread; cosmetic thread is not solid thread
    solid_loft:
      status: unsupported
      classification: UNSUPPORTED
      failure_card_ids:
        - failures/regression/t24_loft_unsupported.md
    sweep_pipe:
      status: unsupported
      classification: UNSUPPORTED
      failure_card_ids:
        - failures/regression/t25_sweep_pipe_unsupported.md
    solid_helix_sweep:
      status: unsupported
      classification: UNSUPPORTED
      failure_card_ids:
        - failures/regression/t26_helix_spring_unsupported.md
    sheet_metal:
      status: unsupported
      classification: UNSUPPORTED
  knowledgeware:
    real_param_formula:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - knowledgeware.real_param_formula
      caveat: formula-driven sketch binding is not yet covered by the T19 regression case
    formula_driven_sketch:
      status: unsupported
      classification: UNSUPPORTED
      failure_card_ids:
        - failures/regression/t19_parameters_formulas_unsupported.md
  assembly:
    product_fix_constraint:
      status: live_verified_once
      classification: NATIVE_SUCCESS
      executable_recipe_ids:
        - assembly.product_fix_constraint
    brep_to_brep_constraints:
      status: unsupported
      classification: UNSUPPORTED
      failure_card_ids:
        - failures/regression/t28_assembly_constraints_unsupported.md
        - failures/regression/t29_hinge_assembly_unsupported.md
      caveat: Product.Position is not Assembly Constraint
