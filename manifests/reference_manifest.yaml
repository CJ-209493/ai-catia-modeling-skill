version: "1.0.7-draft"
reference_patterns:
  - id: partdesign.sketch_revolution_axis
    title: Same-sketch revolution axis for Shaft and Groove
    domain: partdesign
    applies_to: [shaft, groove]
    status: reference_pattern_known
    reference_doc: references/partdesign/sketch_revolution_axis.md
    failure_memory:
      - failures/shaft_without_sketch_axis_not_native.md
      - failures/groove_without_sketch_axis_not_native.md
    verifier_expectations:
      - sketch contains one named construction Line2D used as revolution axis
      - native feature tree contains Shaft or Groove after Part.Update
      - geometry-equivalent revolve/pocket approximations are not native success
    promoted_recipe_ids:
      - partdesign.native_shaft_centerline
      - partdesign.native_groove_centerline
  - id: partdesign.rectangular_pattern_direction_refs
    title: Explicit direction references for RectPattern
    domain: partdesign
    applies_to: [rect_pattern]
    status: reference_pattern_known
    reference_doc: references/partdesign/pattern_references.md
    failure_memory: []
    verifier_expectations:
      - native feature tree contains RectPattern after Part.Update
      - direction references are explicit construction references
      - explicit copied features are not native pattern success
    promoted_recipe_ids:
      - partdesign.native_rectangular_pattern
  - id: partdesign.circular_pattern_axis_ref
    title: Explicit center and axis references for CircPattern
    domain: partdesign
    applies_to: [circ_pattern]
    status: reference_pattern_known
    reference_doc: references/partdesign/pattern_references.md
    failure_memory:
      - failures/circular_pattern_explicit_holes_not_native.md
    verifier_expectations:
      - native feature tree contains CircPattern after Part.Update
      - center and axis references are explicit construction references
      - explicit copied holes are geometry equivalent only
    promoted_recipe_ids:
      - partdesign.native_circular_pattern
  - id: partdesign.mirror_plane_ref
    title: Explicit mirror plane reference for Mirror
    domain: partdesign
    applies_to: [mirror]
    status: reference_pattern_known
    reference_doc: references/partdesign/transform_shell_references.md
    failure_memory:
      - failures/mirror_explicit_copy_not_native.md
    verifier_expectations:
      - native feature tree contains Mirror after Part.Update
      - mirror plane reference is explicit
      - explicit copied geometry is not native mirror success
    promoted_recipe_ids:
      - partdesign.native_mirror_plane
  - id: partdesign.shell_selected_face_ref
    title: Selected face reference for Shell
    domain: partdesign
    applies_to: [shell]
    status: reference_pattern_known
    reference_doc: references/partdesign/transform_shell_references.md
    failure_memory:
      - failures/shell_manual_walls_not_native.md
    verifier_expectations:
      - native feature tree contains Shell after Part.Update
      - removed face reference comes from CATIA selection/reference
      - manual wall construction is not native shell success
    promoted_recipe_ids:
      - partdesign.native_shell_selected_face
