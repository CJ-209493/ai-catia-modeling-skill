    verifier_expectations:
      - native feature tree contains Shell after Part.Update
      - removed face reference comes from CATIA selection/reference
      - manual wall construction is not native shell success
    promoted_recipe_ids:
      - partdesign.native_shell_selected_face
  - id: partdesign.edge_fillet_selected_edge_ref
    title: Selected edge reference for native ConstRadEdgeFillet
    domain: partdesign
    applies_to: [edge_fillet]
    status: reference_pattern_known
    reference_doc: references/partdesign/edge_selection_features.md
    failure_memory:
      - failures/regression/t01_pad_plus_single_edge_fillet_partial_success.md
      - failures/regression/t16_fillet_chamfer_order_unsupported.md
    verifier_expectations:
      - native feature tree contains ConstRadEdgeFillet after Part.Update
      - edge reference comes from Selection.Search("Topology.Edge,sel") scoped to the generated target feature
      - rounded sketch profiles or manual geometry are not native edge fillet success
      - exact four-vertical-edge filtering remains unpromoted
    promoted_recipe_ids:
      - partdesign.native_edge_fillet_selected_edge
  - id: partdesign.chamfer_selected_edge_ref
    title: Selected edge reference for native Chamfer
    domain: partdesign
    applies_to: [chamfer]
    status: reference_pattern_known
    reference_doc: references/partdesign/edge_selection_features.md
    failure_memory:
      - failures/regression/t16_fillet_chamfer_order_unsupported.md
    verifier_expectations:
      - native feature tree contains Chamfer after Part.Update
      - edge reference comes from Selection.Search("Topology.Edge,sel") scoped to the generated target feature
      - ShapeFactory.AddNewChamfer receives explicit propagation, mode, and orientation enum values
      - ordered fillet/chamfer edge grouping remains unpromoted
    promoted_recipe_ids:
      - partdesign.native_chamfer_selected_edge
  - id: partdesign.split_offset_plane_ref
    title: Explicit offset plane reference and target Body state for native Split
    domain: partdesign
    applies_to: [split]
    status: reference_pattern_known
    reference_doc: references/partdesign/split_references.md
    failure_memory:
      - failures/regression/t18_angled_cut_unsupported.md
    verifier_expectations:
      - native feature tree contains Split after Part.Update
      - split reference comes from a generated offset PlaneXY reference
      - Part.InWorkObject is set to the target Body before ShapeFactory.AddNewSplit
      - arbitrary angled cut plane synthesis remains unpromoted
    promoted_recipe_ids:
      - partdesign.native_split_offset_plane
  - id: partdesign.intersect_target_body_ref
