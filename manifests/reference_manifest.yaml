version: "1.0.13-draft"
reference_patterns:
  - id: partdesign.sketch_revolution_axis
    title: Same-sketch revolution axis for Shaft and Groove
    domain: partdesign
    applies_to: [shaft, groove]
    status: reference_pattern_known
    reference_doc: references/partdesign/sketch_revolution_axis.md
    failure_memory:
      - failures/shaft_without_sketch_axis_not_native.md
      - failures/groove_without_sketch_axis_not_native.md
    verifier_expectations:
      - sketch contains one named construction Line2D used as revolution axis
      - native feature tree contains Shaft or Groove after Part.Update
      - geometry-equivalent revolve/pocket approximations are not native success
    promoted_recipe_ids:
      - partdesign.native_shaft_centerline
      - partdesign.native_groove_centerline
  - id: partdesign.rectangular_pattern_direction_refs
    title: Explicit direction references for RectPattern
    domain: partdesign
    applies_to: [rect_pattern]
    status: reference_pattern_known
    reference_doc: references/partdesign/pattern_references.md
    failure_memory: []
    verifier_expectations:
      - native feature tree contains RectPattern after Part.Update
      - direction references are explicit construction references
      - explicit copied features are not native pattern success
    promoted_recipe_ids:
      - partdesign.native_rectangular_pattern
  - id: partdesign.circular_pattern_axis_ref
