id: partdesign.capsule_with_native_holes
title: Capsule Pad with native end Holes
domain: partdesign
native_feature: Hole
status: live_verified_once
runner: runners/partdesign/capsule_native_holes_runner.py
summary: Create a tangent-arc capsule Pad and add native CATIA Hole features at the capsule end centers.
reference_pattern_ids:
  - partdesign.capsule_profile_native_holes
source_regression_ids:
  - partdesign.regression.t22_capsule_with_native_holes
parameters:
  part_number:
    type: string
    required: false
    default: Capsule_With_Native_Holes
  half_center_distance:
    type: number
    unit: mm
    required: false
    default: 35
  capsule_radius:
    type: number
    unit: mm
    required: false
    default: 15
  pad_depth:
    type: number
    unit: mm
    required: false
    default: 8
  hole_depth:
    type: number
    unit: mm
    required: false
    default: 20
  hole_diameter:
    type: number
    unit: mm
    required: false
    default: 10
preconditions:
  - CATIA V5 is running or can be launched by COM.
  - Runner creates the capsule Pad before the native Holes.
verified_pattern:
  - create Part document
  - create tangent-arc capsule sketch and native Pad
  - create one point sketch per capsule end center
  - ShapeFactory.AddNewHoleFromSketch(point_sketch, depth)
  - Part.Update()
verification:
  required_native_feature: Hole
  part_update_required: true
  required_reference_pattern: partdesign.capsule_profile_native_holes
caveats:
  - This recipe verifies native Hole features through a capsule Pad, not pocket-modeled holes.
  - Capsule profile tangency is constructed geometrically; sketch constraints are not fully asserted.
