$schema: "https://json-schema.org/draft/2020-12/schema"
title: AI-CATIA Recipe Card
type: object
required: [id, title, domain, native_feature, status, runner, parameters, verification]
properties:
  id:
    type: string
  title:
    type: string
  domain:
    type: string
    enum: [partdesign, knowledgeware, assembly]
  native_feature:
    type: string
  status:
    type: string
    enum: [draft, experimental, live_verified_once, verified_repeatable, stable, deprecated]
  runner:
    type: string
  parameters:
    type: object
  verification:
    type: object
  caveats:
    type: array
    items:
      type: string
